name: Unity Package CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Unity Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Code ophalen
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      # 2. Unity Test Runner uitvoeren
      - name: Run Unity Tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          testMode: editMode
          artifactsPath: results-artifacts
          coverageOptions: "generateAdditionalMetrics;generateHtmlReport;generateBadgeReport;coverWithOpenCover"

      # 3. Test resultaten uploaden als artifact
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Test Results
          path: results-artifacts

      # 4. Coverage badge genereren (optioneel, voor README)
      - name: Generate Coverage Badge
        uses: game-ci/coverage-report-action@v4
        with:
          json_file: results-artifacts/coverage.json
          github_token: ${{ secrets.GITHUB_TOKEN }}
          badge_name: Coverage
