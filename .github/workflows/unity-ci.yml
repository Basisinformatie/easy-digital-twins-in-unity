name: Unity Package CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Unity Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Code ophalen
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      # 2. Unity Test Runner uitvoeren
      - name: Run Unity Tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
 #         projectPath: .
          testMode: editMode
          artifactsPath: results-artifacts
          coverageOptions: "generateAdditionalMetrics;generateHtmlReport;generateBadgeReport;coverWithOpenCover"

      # 3. Upload test resultaten (voor debuggen)
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Test Results
          path: results-artifacts

      # 4. Upload coverage naar Codecov (Vervangt de oude coverage-report-action)
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: results-artifacts/coverage.info # Of .xml/.json afhankelijk van je output
          fail_ci_if_error: false # Zorg dat de pipeline niet faalt als Codecov tijdelijk down is
          verbose: true
