name: Unit Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  unit-test-job:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      actions: read
      checks: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x' # Or specify the version your project uses

      - name: Run Tests
        run: dotnet test Tests/Tests.csproj --configuration Release --logger "trx;LogFileName=test-results.trx"

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Test Results
          path: "**/test-results.trx"
          reporter: dotnet-trx
